server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

api.key = ${GROQ_KEY}
api.url=https://api.groq.com/openai/v1/chat/completions
api.model=llama-3.1-8b-instant
api.max-tokens=200

cors.allowed-origins=${FRONTEND_URL:https://asifalim-swe.onrender.com}

#SMTP mail service
#spring.mail.host=smtp.gmail.com
#spring.mail.port=587
#spring.mail.username=${EMAIL_USERNAME}
#spring.mail.password=${EMAIL_PASSWORD}
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true

#SENDGRID mail service
sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.verified.email=${SENDGRID_VERIFIED_EMAIL}
sendgrid.recipient.email=${SENDGRID_RECIPIENT_EMAIL}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

logging.level.com.asifalim=DEBUG
logging.level.org.springframework.web=INFO

spring.profiles.active=local

